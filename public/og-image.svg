<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0f1419"/>
  <!-- Subtle pattern -->
  <circle cx="200" cy="315" r="180" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1000" cy="315" r="180" fill="none" stroke="#3d8b8b" stroke-width="0.5" opacity="0.15"/>
  <circle cx="600" cy="315" r="180" fill="none" stroke="#a85c32" stroke-width="0.5" opacity="0.1"/>
  <!-- Gold accent line -->
  <line x1="400" y1="200" x2="800" y2="200" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
  <!-- Top label -->
  <text x="600" y="250" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#c9a84c" letter-spacing="6" opacity="0.8">ERASMUS+ KA171</text>
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#faf5ee" font-weight="600">Science, Creation, Contingency,</text>
  <text x="600" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#c9a84c" font-weight="600">and the Human Person</text>
  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#a8a29e" font-style="italic">A Christian Conversation After Dependent Origination</text>
  <!-- Gold accent line -->
  <line x1="400" y1="465" x2="800" y2="465" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
  <!-- Footer -->
  <text x="600" y="510" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#78716c">Comenius University, Bratislava &amp; VNU Hanoi</text>
  <text x="600" y="540" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#57534e">prof. Michal Valco, PhD.</text>
</svg>
